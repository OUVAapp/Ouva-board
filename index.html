<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouva — Board</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #2f81f7;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --pink: #f778ba;
    --cyan: #56d4dd;
    --gerard: #2f81f7;
    --jeshanth: #da7756;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 span { font-size: 24px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stats {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  .stats span { display: flex; align-items: center; gap: 4px; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .avatar-g { background: var(--gerard); }
  .avatar-j { background: var(--jeshanth); }
  .avatar-e { background: var(--purple); }

  .legend {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .board {
    display: flex;
    gap: 14px;
    padding: 20px;
    overflow-x: auto;
    min-height: calc(100vh - 80px);
    align-items: flex-start;
  }

  .column {
    min-width: 270px;
    max-width: 270px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .column-header {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .column-header .count {
    background: var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }

  .column-header .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-backlog { background: var(--text-muted); }
  .dot-spec { background: var(--cyan); }
  .dot-todo { background: var(--accent); }
  .dot-progress { background: var(--orange); }
  .dot-review { background: var(--purple); }
  .dot-done { background: var(--green); }

  .column-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 40px;
  }

  .card {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    cursor: grab;
    transition: border-color 0.15s, transform 0.15s;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .card-id {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 12px;
    font-weight: 500;
    border: 1px solid;
  }

  .tag-feat { color: var(--green); border-color: #1a4d2e; background: #0d2818; }
  .tag-bug { color: var(--red); border-color: #5c1a1a; background: #2d1013; }
  .tag-infra { color: var(--orange); border-color: #4d3519; background: #2a1d0e; }
  .tag-test { color: var(--purple); border-color: #3d2a5c; background: #1e1430; }
  .tag-api { color: #f97583; border-color: #5c1a2a; background: #2d1018; }
  .tag-web { color: var(--green); border-color: #1a4d2e; background: #0d2818; }
  .tag-mobile { color: var(--accent); border-color: #1a3a5c; background: #0d1f30; }
  .tag-p0 { color: var(--red); border-color: #5c1a1a; background: #2d1013; }
  .tag-p1 { color: var(--orange); border-color: #4d3519; background: #2a1d0e; }
  .tag-p2 { color: var(--text-muted); border-color: var(--border); background: var(--surface); }

  .card-assignees {
    display: flex;
  }

  .card-assignees .avatar {
    width: 22px;
    height: 22px;
    font-size: 10px;
    margin-left: -4px;
  }

  .card-assignees .avatar:first-child { margin-left: 0; }

  /* Drag and drop */
  .card.dragging { opacity: 0.4; transform: rotate(2deg); }
  .column-body.drag-over { background: rgba(47, 129, 247, 0.08); border-radius: 8px; }

  .updated {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 8px;
    border-top: 1px solid var(--border);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .board { padding: 12px; gap: 10px; }
    .column { min-width: 240px; max-width: 240px; }
    header { padding: 14px; flex-direction: column; gap: 8px; }
    .legend { font-size: 12px; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <h1><span>📋</span> Ouva Board</h1>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="avatar avatar-g">G</div> Gérard</div>
      <div class="legend-item"><div class="avatar avatar-j">J</div> Jeshanth</div>
      <div class="legend-item"><div class="avatar avatar-e">E</div> Emily</div>
    </div>
  </div>
</header>

<div class="board" id="board"></div>

<script>
const COLUMNS = [
  { id: 'backlog', label: 'Backlog', dot: 'dot-backlog' },
  { id: 'spec', label: 'Spec / Analyse', dot: 'dot-spec' },
  { id: 'todo', label: 'Todo', dot: 'dot-todo' },
  { id: 'progress', label: 'In Progress', dot: 'dot-progress' },
  { id: 'review', label: 'Review', dot: 'dot-review' },
  { id: 'done', label: 'Done', dot: 'dot-done' },
];

let TASKS = [];

function getAvatarClass(a) {
  if (a === 'G') return 'avatar-g';
  if (a === 'J') return 'avatar-j';
  return 'avatar-e';
}

function renderCard(task) {
  const tags = task.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
  const assignees = task.assignees.map(a =>
    `<div class="avatar ${getAvatarClass(a)}">${a}</div>`
  ).join('');

  return `
    <div class="card" draggable="true" data-id="${task.id}">
      <div class="card-id">${task.id}</div>
      <div class="card-title">${task.title}</div>
      ${task.desc ? `<div class="card-desc">${task.desc}</div>` : ''}
      <div class="card-meta">
        <div class="card-tags">${tags}</div>
        <div class="card-assignees">${assignees}</div>
      </div>
    </div>
  `;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = COLUMNS.map(col => {
    const tasks = TASKS.filter(t => t.status === col.id);
    return `
      <div class="column">
        <div class="column-header">
          <div class="dot ${col.dot}"></div>
          ${col.label}
          <span class="count">${tasks.length}</span>
        </div>
        <div class="column-body" data-status="${col.id}">
          ${tasks.map(renderCard).join('')}
        </div>
      </div>
    `;
  }).join('');

  setupDragDrop();
}

function saveState() {
  const state = {};
  TASKS.forEach(t => state[t.id] = t.status);
  localStorage.setItem('ouva-board-v2', JSON.stringify(state));
}

function setupDragDrop() {
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });

  document.querySelectorAll('.column-body').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const task = TASKS.find(t => t.id === id);
      if (task) {
        task.status = col.dataset.status;
        saveState();
        render();
      }
    });
  });
}

// Load data from JSON file, then apply localStorage overrides
fetch('data.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    TASKS = data;
    // Apply any localStorage overrides (manual drag changes)
    const saved = JSON.parse(localStorage.getItem('ouva-board-v2') || '{}');
    TASKS.forEach(t => { if (saved[t.id]) t.status = saved[t.id]; });
    render();
  })
  .catch(() => {
    document.getElementById('board').innerHTML = '<p style="padding:40px;color:var(--text-muted)">Erreur chargement data.json</p>';
  });
</script>
</body>
</html>
